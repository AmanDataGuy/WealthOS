services:

  # ── 1. FastAPI Backend ─────────────────────────────────
  wealthos-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: wealthos-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override .env localhost URLs with Docker service-name URLs
      WEALTHOS_DB_URL: postgresql://wealthos:wealthos_secure_password@wealthos-db:5432/wealthos
      REDIS_URL: redis://wealthos-redis:6379
      QDRANT_URL: http://wealthos-qdrant:6333
    volumes:
      - model_cache:/root/.cache/huggingface
    depends_on:
      wealthos-db:
        condition: service_healthy
      wealthos-redis:
        condition: service_healthy
      wealthos-qdrant:
        condition: service_started
    networks:
      - wealthos-network
    restart: unless-stopped

  # ── 2. Streamlit Frontend ──────────────────────────────
  # MCP servers are stdio subprocesses inside the API container — no separate container needed
  wealthos-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: wealthos-frontend
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      WEALTHOS_API_URL: http://wealthos-api:8000
    depends_on:
      - wealthos-api
    networks:
      - wealthos-network
    restart: unless-stopped

  # ── 3. PostgreSQL 16 ───────────────────────────────────
  wealthos-db:
    image: postgres:16-alpine
    container_name: wealthos-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: wealthos
      POSTGRES_PASSWORD: wealthos_secure_password
      POSTGRES_DB: wealthos
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - wealthos-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wealthos"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 4. Redis ───────────────────────────────────────────
  wealthos-redis:
    image: redis:7-alpine
    container_name: wealthos-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - wealthos-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 5. Qdrant (local vector store) ────────────────────
  wealthos-qdrant:
    image: qdrant/qdrant:latest
    container_name: wealthos-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - wealthos-network
    restart: unless-stopped

  # ── 6. Temporal (durable workflows) ───────────────────
  wealthos-temporal:
    image: temporalio/auto-setup:1.22.0
    container_name: wealthos-temporal
    ports:
      - "7233:7233"
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=wealthos
      - POSTGRES_PWD=wealthos_secure_password
      - POSTGRES_SEEDS=wealthos-db
    depends_on:
      wealthos-db:
        condition: service_healthy
    networks:
      - wealthos-network
    restart: unless-stopped

# ── Volumes ─────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  model_cache:

# ── Network ─────────────────────────────────────────────
networks:
  wealthos-network:
    driver: bridge
